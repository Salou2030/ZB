<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Visor — PlateReader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0c10; --surface: #111318; --border: #1e2330;
    --text: #e8eaf0; --muted: #4a5068;
    --success: #00ff88; --err: #ff4455;
    --col-pr: #a78bfa; --col-cl: #ff6b35;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; }

  /* ── HEADER ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
  }

  .btn-back {
    display: flex; align-items: center; gap: 6px;
    background: transparent; border: 1px solid rgba(167,139,250,0.4);
    border-radius: 8px; padding: 7px 12px; cursor: pointer;
    color: var(--col-pr); font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
  }
  .btn-back:hover { background: rgba(167,139,250,0.1); }

  .plate-badge {
    background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.35);
    border-radius: 6px; padding: 5px 12px;
    font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700;
    color: var(--col-pr); letter-spacing: 4px; text-transform: uppercase;
    flex-shrink: 0; display: none;
  }
  .plate-badge.visible { display: block; }

  .spacer { flex: 1; }

  /* ── TURBO BADGE ── */
  .turbo-badge {
    display: none; align-items: center; gap: 6px; flex-shrink: 0;
    background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.35);
    border-radius: 8px; padding: 5px 10px;
  }
  .turbo-badge.active { display: flex; }
  .turbo-label { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--col-cl); letter-spacing: 1px; text-transform: uppercase; }
  .turbo-count { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; color: var(--col-cl); min-width: 16px; text-align: center; }

  /* Anillo SVG — radio 9, circunferencia = 2π×9 ≈ 56.55 */
  .turbo-ring { width: 24px; height: 24px; flex-shrink: 0; }
  .turbo-ring svg { display: block; transform: rotate(-90deg); }
  .ring-bg   { fill: none; stroke: rgba(255,107,53,0.2); stroke-width: 3; }
  .ring-fill {
    fill: none; stroke: var(--col-cl); stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 56.55;
    stroke-dashoffset: 56.55; /* empieza vacío, se irá llenando al revés */
    transition: stroke-dashoffset 1s linear;
  }

  /* ── IFRAME ── */
  .iframe-wrap { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; }
  #siteFrame { width: 100%; height: 100%; border: none; display: block; background: #fff; }

  /* ── MENSAJES SUPERPUESTOS ── */
  .overlay-msg {
    display: none; position: absolute; inset: 0; background: var(--bg);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 32px; text-align: center;
  }
  .overlay-msg.visible { display: flex; }
  .msg-icon  { font-size: 44px; }
  .msg-title { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--err); letter-spacing: 1px; text-transform: uppercase; }
  .msg-desc  { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 300px; }
  .msg-url   { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--col-pr); word-break: break-all; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2); border-radius: 6px; padding: 8px 12px; max-width: 300px; }
  .btn-action { background: linear-gradient(135deg, var(--col-pr), #6d28d9); color: #fff; border: none; border-radius: 10px; padding: 12px 24px; font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 16px rgba(167,139,250,0.3); }

  /* ── CANCELAR TURBO (flotante) ── */
  .btn-cancel-turbo {
    display: none; position: fixed; bottom: 20px; right: 16px; z-index: 200;
    background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.4);
    border-radius: 8px; padding: 10px 16px; color: var(--col-cl);
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel-turbo:hover { background: rgba(255,107,53,0.28); }
  .btn-cancel-turbo.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <button class="btn-back" onclick="goBack()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Volver
  </button>

  <div class="plate-badge" id="plateBadge"></div>

  <div class="spacer"></div>

  <div class="turbo-badge" id="turboBadge">
    <div class="turbo-ring">
      <svg width="24" height="24" viewBox="0 0 24 24">
        <circle class="ring-bg" cx="12" cy="12" r="9"/>
        <circle class="ring-fill" id="ringFill" cx="12" cy="12" r="9"/>
      </svg>
    </div>
    <span class="turbo-label">Turbo</span>
    <span class="turbo-count" id="turboCount">5</span>
  </div>
</div>

<div class="iframe-wrap">
  <iframe id="siteFrame"
    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation">
  </iframe>

  <div class="overlay-msg" id="blockedMsg">
    <div class="msg-icon">🚫</div>
    <div class="msg-title">Web no embebible</div>
    <div class="msg-desc">Este sitio bloquea su visualización en iframe (X-Frame-Options). Puedes abrirlo en otra pestaña.</div>
    <div class="msg-url" id="blockedUrlEl"></div>
    <button class="btn-action" onclick="openDirect()">Abrir en nueva pestaña</button>
  </div>

  <div class="overlay-msg" id="noUrlMsg">
    <div class="msg-icon">🔗</div>
    <div class="msg-title">Sin URL configurada</div>
    <div class="msg-desc">Introduce una URL en index.html y vuelve a abrir el iframe.</div>
    <button class="btn-action" onclick="goBack()">← Volver a PlateReader</button>
  </div>
</div>

<button class="btn-cancel-turbo" id="btnCancelTurbo" onclick="cancelTurbo()">✕ Cancelar turbo</button>

<script>
// ── CONSTANTES ────────────────────────────────────────────────────────────────
const TURBO_SECONDS = 5;
const CIRCUMFERENCE = 56.55; // 2 * π * 9

// ── ELEMENTOS ─────────────────────────────────────────────────────────────────
const frame        = document.getElementById('siteFrame');
const blockedMsg   = document.getElementById('blockedMsg');
const blockedUrlEl = document.getElementById('blockedUrlEl');
const noUrlMsg     = document.getElementById('noUrlMsg');
const plateBadge   = document.getElementById('plateBadge');
const turboBadge   = document.getElementById('turboBadge');
const turboCount   = document.getElementById('turboCount');
const ringFill     = document.getElementById('ringFill');
const btnCancel    = document.getElementById('btnCancelTurbo');

let turboTimer   = null;
let turboSeconds = TURBO_SECONDS;

// ── CARGAR URL ────────────────────────────────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
const siteUrl = params.get('url') || localStorage.getItem('pr_external_url') || '';

if (siteUrl) {
  frame.src = siteUrl;
  let frameLoaded = false;
  frame.addEventListener('load', () => { frameLoaded = true; });
  setTimeout(() => { if (!frameLoaded) showBlocked(); }, 9000);
  frame.addEventListener('error', () => showBlocked());
} else {
  frame.style.display = 'none';
  noUrlMsg.classList.add('visible');
}

function showBlocked() {
  frame.style.display = 'none';
  blockedMsg.classList.add('visible');
  blockedUrlEl.textContent = siteUrl;
}

function openDirect() {
  window.open(siteUrl, '_blank');
}

// ── MATRÍCULA ─────────────────────────────────────────────────────────────────
// Clave idéntica a la que usa index.html: 'pr_last_plate'
function refreshPlate() {
  const plate = localStorage.getItem('pr_last_plate') || '';
  if (plate) {
    plateBadge.textContent = plate;
    plateBadge.classList.add('visible');
  }
}
refreshPlate();

window.addEventListener('storage', e => {
  if (e.key === 'pr_last_plate') {
    const plate = e.newValue || '';
    plateBadge.textContent = plate;
    plateBadge.className = 'plate-badge' + (plate ? ' visible' : '');
    // Nueva matrícula mientras turbo corre → reiniciar cuenta
    if (isTurboEnabled() && turboTimer) {
      cancelTurbo();
      setTimeout(startTurbo, 100);
    }
  }
});

// ── TURBO ─────────────────────────────────────────────────────────────────────
// Clave idéntica a la que usa index.html: 'pr_turbo_active'
function isTurboEnabled() {
  return localStorage.getItem('pr_turbo_active') === '1';
}

function startTurbo() {
  if (turboTimer) return;

  turboSeconds = TURBO_SECONDS;
  turboBadge.classList.add('active');
  btnCancel.classList.add('visible');
  updateTurboUI(); // muestra el valor inicial (5)

  turboTimer = setInterval(() => {
    turboSeconds--;

    if (turboSeconds <= 0) {
      updateTurboUI(); // muestra el 0 antes de cerrar
      stopTurboTimer();
      setTimeout(goBack, 300); // pequeño delay para que se vea el 0
    } else {
      updateTurboUI();
    }
  }, 1000);
}

function stopTurboTimer() {
  if (turboTimer) { clearInterval(turboTimer); turboTimer = null; }
}

function cancelTurbo() {
  stopTurboTimer();
  turboBadge.classList.remove('active');
  btnCancel.classList.remove('visible');
  turboSeconds = TURBO_SECONDS;
  turboCount.textContent = TURBO_SECONDS;
  // Anillo vacío (offset = CIRCUMFERENCE)
  ringFill.style.transition = 'none';
  ringFill.style.strokeDashoffset = CIRCUMFERENCE;
  // Forzar reflow para que la transición se reinicie limpiamente
  ringFill.getBoundingClientRect();
  ringFill.style.transition = 'stroke-dashoffset 1s linear';
}

function updateTurboUI() {
  turboCount.textContent = turboSeconds;
  // offset = 0 → anillo completamente visible (lleno)
  // offset = CIRCUMFERENCE → anillo invisible (vacío)
  // Empieza lleno (segundos=5) y se vacía conforme bajan los segundos
  const ratio = turboSeconds / TURBO_SECONDS;
  ringFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - ratio);
}

// ── VISIBILIDAD ───────────────────────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    refreshPlate();
    if (isTurboEnabled() && !turboTimer) {
      startTurbo();
    }
  } else {
    // Usuario sale manualmente → cancelar para no interrumpirle al volver
    cancelTurbo();
  }
});

// Si ya está visible al cargar (foco inmediato desde index)
if (document.visibilityState === 'visible' && isTurboEnabled()) {
  setTimeout(startTurbo, 600);
}

// ── VOLVER A INDEX ────────────────────────────────────────────────────────────
function goBack() {
  stopTurboTimer();

  // Opción 1: si esta pestaña fue abierta por index.html con window.open,
  // window.opener existe → dar foco a index y cerrar visor
  if (window.opener && !window.opener.closed) {
    try {
      window.opener.focus();
      window.close();
      return;
    } catch(e) {
      // Si falla (política del navegador), caer a opción 2
    }
  }

  // Opción 2: navegar esta misma pestaña a index.html
  window.location.href = 'index.html';
}
</script>
</body>
</html>
