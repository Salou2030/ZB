<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Visor — PlateReader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0c10; --surface: #111318; --border: #1e2330;
    --text: #e8eaf0; --muted: #4a5068;
    --success: #00ff88; --err: #ff4455;
    --col-pr: #a78bfa; --col-cl: #ff6b35; --col-ocr: #00e5ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Rajdhani', sans-serif;
  }

  /* ── HEADER BAR ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
  }

  .btn-back {
    display: flex; align-items: center; gap: 6px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; cursor: pointer;
    color: var(--col-pr); font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
  }
  .btn-back:hover { background: rgba(167,139,250,0.08); border-color: var(--col-pr); }

  .plate-badge {
    background: rgba(167,139,250,0.12);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 6px; padding: 5px 12px;
    font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700;
    color: var(--col-pr); letter-spacing: 4px; text-transform: uppercase;
    flex-shrink: 0; display: none;
  }
  .plate-badge.visible { display: block; }

  .url-display {
    flex: 1; font-family: 'Space Mono', monospace; font-size: 9px;
    color: var(--muted); letter-spacing: 0.5px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }

  /* TURBO COUNTDOWN */
  .turbo-badge {
    display: none; align-items: center; gap: 6px; flex-shrink: 0;
    background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.3);
    border-radius: 8px; padding: 6px 12px;
  }
  .turbo-badge.active { display: flex; }
  .turbo-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--col-cl); letter-spacing: 1px; text-transform: uppercase; }
  .turbo-count {
    font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700;
    color: var(--col-cl); min-width: 18px; text-align: center;
  }
  .turbo-ring {
    width: 22px; height: 22px; position: relative; flex-shrink: 0;
  }
  .turbo-ring svg { transform: rotate(-90deg); }
  .turbo-ring circle {
    fill: none; stroke: var(--col-cl); stroke-width: 2.5;
    stroke-dasharray: 57; stroke-dashoffset: 57;
    stroke-linecap: round; transition: stroke-dashoffset 1s linear;
  }

  /* ── IFRAME AREA ── */
  .iframe-wrap {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
  }

  #siteFrame {
    width: 100%; height: 100%; border: none; display: block;
    background: #fff;
  }

  /* ── BLOCKED MESSAGE ── */
  .blocked-msg {
    display: none;
    position: absolute; inset: 0;
    background: var(--bg);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 32px; text-align: center;
  }
  .blocked-msg.visible { display: flex; }

  .blocked-icon { font-size: 48px; }
  .blocked-title {
    font-family: 'Space Mono', monospace; font-size: 13px;
    color: var(--err); letter-spacing: 1px; text-transform: uppercase;
  }
  .blocked-desc { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 320px; }
  .blocked-url {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--col-pr); word-break: break-all;
    background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2);
    border-radius: 6px; padding: 8px 12px; max-width: 320px;
  }
  .btn-open-direct {
    background: linear-gradient(135deg, var(--col-pr), #6d28d9);
    color: #fff; border: none; border-radius: 10px;
    padding: 12px 24px; font-family: 'Rajdhani', sans-serif;
    font-size: 14px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    box-shadow: 0 4px 16px rgba(167,139,250,0.3);
  }

  /* ── TURBO CANCELAR ── */
  .btn-cancel-turbo {
    position: fixed; bottom: 20px; right: 16px; z-index: 200;
    display: none;
    background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.4);
    border-radius: 8px; padding: 10px 16px; color: var(--col-cl);
    font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
  }
  .btn-cancel-turbo.visible { display: block; }

  /* ── NO URL ── */
  .no-url-msg {
    display: none;
    position: absolute; inset: 0;
    background: var(--bg);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 32px; text-align: center;
  }
  .no-url-msg.visible { display: flex; }
  .no-url-msg p { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; line-height: 1.7; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <button class="btn-back" onclick="goBack()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Volver
  </button>

  <div class="plate-badge" id="plateBadge"></div>

  <div class="url-display" id="urlDisplay">Sin URL configurada</div>

  <div class="turbo-badge" id="turboBadge">
    <div class="turbo-ring">
      <svg width="22" height="22" viewBox="0 0 22 22">
        <circle id="turboCircle" cx="11" cy="11" r="9"/>
      </svg>
    </div>
    <span class="turbo-label">Turbo</span>
    <span class="turbo-count" id="turboCount">5</span>
  </div>
</div>

<!-- IFRAME -->
<div class="iframe-wrap">
  <iframe id="siteFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation"></iframe>

  <!-- Mensaje web bloqueada -->
  <div class="blocked-msg" id="blockedMsg">
    <div class="blocked-icon">🚫</div>
    <div class="blocked-title">Web no embebible</div>
    <div class="blocked-desc">
      Este sitio web no permite ser mostrado dentro de un iframe
      (X-Frame-Options bloqueado). Puedes abrirlo directamente en otra pestaña.
    </div>
    <div class="blocked-url" id="blockedUrl"></div>
    <button class="btn-open-direct" onclick="openDirect()">Abrir en nueva pestaña</button>
  </div>

  <!-- Sin URL -->
  <div class="no-url-msg" id="noUrlMsg">
    <div class="blocked-icon">🔗</div>
    <p>No hay URL configurada.<br>Ve a index.html, introduce una URL<br>y vuelve a abrir el iframe.</p>
    <button class="btn-open-direct" onclick="goBack()">← Volver a PlateReader</button>
  </div>
</div>

<!-- Botón cancelar turbo flotante -->
<button class="btn-cancel-turbo" id="btnCancelTurbo" onclick="cancelTurbo()">✕ Cancelar turbo</button>

<script>
// ── PARÁMETROS ────────────────────────────────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
const siteUrl = params.get('url') || localStorage.getItem('pr_external_url') || '';

const frame       = document.getElementById('siteFrame');
const blockedMsg  = document.getElementById('blockedMsg');
const blockedUrlEl= document.getElementById('blockedUrl');
const noUrlMsg    = document.getElementById('noUrlMsg');
const urlDisplay  = document.getElementById('urlDisplay');
const plateBadge  = document.getElementById('plateBadge');
const turboBadge  = document.getElementById('turboBadge');
const turboCount  = document.getElementById('turboCount');
const turboCircle = document.getElementById('turboCircle');
const btnCancel   = document.getElementById('btnCancelTurbo');

let turboTimer    = null;
let turboSeconds  = 5;
const TURBO_TOTAL = 5;
const CIRCUMFERENCE = 2 * Math.PI * 9; // r=9 → ~56.5

// ── CARGA DE URL ──────────────────────────────────────────────────────────────
if (siteUrl) {
  urlDisplay.textContent = siteUrl;
  frame.src = siteUrl;

  // Detectar si el iframe fue bloqueado
  // La forma más fiable: timeout + onerror + mensaje beforeload
  let loaded = false;
  frame.addEventListener('load', () => {
    loaded = true;
    // Intentar acceder al contenido — fallará en cross-origin pero eso es OK
    // Si no hay error de carga, el iframe cargó (aunque sea cross-origin)
    blockedMsg.classList.remove('visible');
  });

  // Si el iframe no carga en 8 segundos, mostrar mensaje
  setTimeout(() => {
    if (!loaded) {
      showBlocked();
    }
  }, 8000);

  // Detectar error explícito (funciona en algunos casos)
  frame.addEventListener('error', () => showBlocked());

} else {
  frame.style.display = 'none';
  noUrlMsg.classList.add('visible');
}

function showBlocked() {
  frame.style.display = 'none';
  blockedMsg.classList.add('visible');
  blockedUrlEl.textContent = siteUrl;
}

function openDirect() {
  window.open(siteUrl, '_blank');
}

// ── MATRÍCULA DESDE INDEX ─────────────────────────────────────────────────────
function checkPlate() {
  const plate = localStorage.getItem('pr_last_plate') || '';
  if (plate) {
    plateBadge.textContent = plate;
    plateBadge.classList.add('visible');
  }
}
checkPlate();

// Escuchar cambios de localStorage (cuando index copia una matrícula nueva)
window.addEventListener('storage', (e) => {
  if (e.key === 'pr_last_plate') {
    const plate = e.newValue || '';
    plateBadge.textContent = plate;
    plateBadge.className = 'plate-badge' + (plate ? ' visible' : '');
  }
  if (e.key === 'pr_turbo_active') {
    // Si index actualiza el turbo mientras visor está en foco, no hace nada
    // El turbo se activa cuando visor recibe el foco
  }
});

// ── TURBO ─────────────────────────────────────────────────────────────────────
function isTurboEnabled() {
  return localStorage.getItem('pr_turbo_active') === '1';
}

function startTurbo() {
  if (turboTimer) return; // ya corriendo
  turboSeconds = TURBO_TOTAL;
  turboBadge.classList.add('active');
  btnCancel.classList.add('visible');
  updateTurboUI();

  turboTimer = setInterval(() => {
    turboSeconds--;
    updateTurboUI();
    if (turboSeconds <= 0) {
      clearInterval(turboTimer);
      turboTimer = null;
      turboBadge.classList.remove('active');
      btnCancel.classList.remove('visible');
      goBack();
    }
  }, 1000);
}

function cancelTurbo() {
  if (turboTimer) { clearInterval(turboTimer); turboTimer = null; }
  turboBadge.classList.remove('active');
  btnCancel.classList.remove('visible');
  turboCount.textContent = TURBO_TOTAL;
  turboCircle.style.strokeDashoffset = CIRCUMFERENCE;
}

function updateTurboUI() {
  turboCount.textContent = turboSeconds;
  // Anillo: va de lleno (offset=CIRCUMFERENCE) a vacío (offset=0)
  const progress = turboSeconds / TURBO_TOTAL;
  turboCircle.style.strokeDashoffset = CIRCUMFERENCE * progress;
}

// Activar turbo cuando visor recibe el foco (el usuario llega aquí)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    checkPlate();
    if (isTurboEnabled()) {
      startTurbo();
    }
  } else {
    // Si el usuario sale manualmente, cancelar turbo
    cancelTurbo();
  }
});

// También activar si ya está visible al cargar (primera carga)
if (document.visibilityState === 'visible' && isTurboEnabled()) {
  // Pequeño delay para que el usuario vea que ha llegado
  setTimeout(startTurbo, 500);
}

// ── VOLVER A INDEX ────────────────────────────────────────────────────────────
function goBack() {
  cancelTurbo();
  // Intentar dar foco a la ventana que nos abrió (index.html)
  if (window.opener && !window.opener.closed) {
    try { window.opener.focus(); return; } catch(e) {}
  }
  // Fallback: navegar a index.html
  window.location.href = 'index.html';
}
</script>
</body>
</html>
